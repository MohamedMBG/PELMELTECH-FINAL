<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" opacity="0.04" fill="none">
  <defs>
    <!-- Primary grid pattern -->
    <pattern id="fineGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#000" stroke-width="0.5"/>
    </pattern>
    
    <!-- Registration Mark Def -->
    <g id="registration-mark">
      <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="0.75" fill="none"/>
      <line x1="12" y1="2" x2="12" y2="22" stroke="currentColor" stroke-width="0.75"/>
      <line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="0.75"/>
      <circle cx="12" cy="12" r="3" fill="currentColor"/>
    </g>

    <!-- Crop Mark Def -->
    <g id="crop-mark">
      <path d="M 0 10 L 20 10 M 10 0 L 10 20" stroke="currentColor" stroke-width="0.75"/>
    </g>
  </defs>

  <!-- Fill with Grid -->
  <rect width="100%" height="100%" fill="url(#fineGrid)" />

  <!-- Corner Elements -->
  <!-- Top Left -->
  <use href="#registration-mark" x="30" y="30" class="text-cyan" stroke="#00e5ff" fill="#00e5ff"/>
  <use href="#crop-mark" x="10" y="10" class="text-black" stroke="#0f172a"/>
  
  <!-- Top Right -->
  <use href="#registration-mark" x="96%" y="30" class="text-magenta" stroke="#ff007f" fill="#ff007f"/>
  
  <!-- Bottom Left -->
  <use href="#registration-mark" x="30" y="94%" class="text-yellow" stroke="#eab308" fill="#eab308"/>
  
  <!-- Bottom Right -->
  <use href="#registration-mark" x="96%" y="94%" class="text-black" stroke="#0f172a" fill="#0f172a"/>

  <!-- Technical Labels -->
  <text x="70" y="45" font-family="monospace" font-size="10" fill="#0f172a" font-weight="bold">SCALE: 1:1</text>
  <text x="70" y="60" font-family="monospace" font-size="8" fill="#0f172a" opacity="0.6">CMYK_CALIBRATION_v4.2</text>
</svg>
